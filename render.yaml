services:
  - type: web
    name: chatify-backend
    runtime: node
    plan: free
    rootDir: walter-backend
    buildCommand: npm ci
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: Chatify
      - key: ARCJET_KEY
        sync: false
      - key: ARCJET_ENV
        value: production

  - type: web
    name: chatify-frontend
    runtime: static
    rootDir: walter-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_TRULY_PDF_URL
        value: https://truly-pdf.onrender.com
